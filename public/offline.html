<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <title>NEXA Campus Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 560px);
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }

      .mark {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        font-weight: 900;
        font-size: 18px;
      }

      h1 {
        margin: 20px 0 10px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #475569;
        line-height: 1.7;
      }

      ul {
        display: grid;
        gap: 10px;
        margin: 20px 0 0;
        padding: 0;
        list-style: none;
      }

      li {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 12px 14px;
      }

      .deadline-title {
        display: block;
        font-weight: 900;
      }

      .deadline-meta {
        display: block;
        margin-top: 4px;
        color: #64748b;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">NX</div>
      <h1>Kamu offline.</h1>
      <p>Deadline tetap ada, tapi perlu koneksi buat sync.</p>
      <ul id="deadline-list" aria-live="polite"></ul>
    </main>
    <script>
      const list = document.getElementById('deadline-list')

      async function showCachedDeadlines() {
        if (!('caches' in window)) return

        const cacheNames = await caches.keys()
        for (const cacheName of cacheNames) {
          const cache = await caches.open(cacheName)
          const requests = await cache.keys()
          const deadlineRequest = requests.find((request) => {
            const url = new URL(request.url)
            return (
              url.pathname.includes('/api/schedules') ||
              url.pathname.includes('/api/exam-schedules')
            )
          })

          if (!deadlineRequest) continue

          const response = await cache.match(deadlineRequest)
          if (!response) continue

          const data = await response
            .clone()
            .json()
            .catch(() => null)
          const items = Array.isArray(data)
            ? data
            : data?.schedules || data?.deadlines || data?.examSchedules || []
          if (!Array.isArray(items) || items.length === 0) continue

          list.innerHTML = items
            .slice(0, 6)
            .map((item) => {
              const title = item.title || item.exam_title || item.name || 'Deadline'
              const date = item.due_date || item.exam_date || item.date || ''
              const category = item.category || item.exam_type || item.priority || ''
              return `<li><span class="deadline-title">${escapeHtml(title)}</span><span class="deadline-meta">${escapeHtml([category, date].filter(Boolean).join(' • '))}</span></li>`
            })
            .join('')
          return
        }
      }

      function escapeHtml(value) {
        return String(value).replace(
          /[&<>"']/g,
          (char) =>
            ({
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#039;',
            })[char]
        )
      }

      showCachedDeadlines()
    </script>
  </body>
</html>
